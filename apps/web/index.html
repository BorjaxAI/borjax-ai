<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BorjaxAI</title>
  <link rel="stylesheet" href="/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="theme-dark">

  <!-- Auth screens (shown when logged out) -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <a href="/" class="logo">Borjax<span>AI</span></a>
      <div id="auth-form-container"></div>
    </div>
  </div>

  <!-- App (shown when logged in) -->
  <div id="app" class="app-layout" style="display:none">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <a href="/" class="logo sidebar-logo">Borjax<span>AI</span></a>
        <nav class="sidebar-nav">
          <a href="#/chat"    class="nav-item" data-page="chat">    <span class="nav-icon">💬</span><span class="nav-label">Chat</span></a>
          <a href="#/tasks"   class="nav-item" data-page="tasks">   <span class="nav-icon">⚡</span><span class="nav-label">Tasks</span></a>
          <a href="#/agents"  class="nav-item" data-page="agents">  <span class="nav-icon">🤖</span><span class="nav-label">Agents</span></a>
          <a href="#/models"  class="nav-item" data-page="models">  <span class="nav-icon">🧠</span><span class="nav-label">Models</span></a>
          <a href="#/connectors" class="nav-item" data-page="connectors"><span class="nav-icon">🔌</span><span class="nav-label">Connectors</span></a>
          <a href="#/billing" class="nav-item" data-page="billing"> <span class="nav-icon">💳</span><span class="nav-label">Billing</span></a>
          <a href="#/settings" class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span><span class="nav-label">Settings</span></a>
        </nav>
      </div>
      <div class="sidebar-bottom">
        <div class="token-usage" id="sidebar-usage">
          <div class="usage-label"><span>Tokens</span><span id="usage-text">0 / 10k</span></div>
          <div class="usage-bar"><div class="usage-fill" id="usage-fill" style="width:0%"></div></div>
        </div>
        <div class="user-pill" id="user-pill">
          <div class="user-avatar" id="user-avatar">?</div>
          <div class="user-info">
            <span id="user-name">Loading...</span>
            <span id="user-plan" class="plan-badge">free</span>
          </div>
          <button class="logout-btn" id="logout-btn" title="Sign out">↩</button>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-area">
      <header class="app-header">
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
        <h1 class="page-title" id="page-title">Chat</h1>
        <div class="header-right">
          <div class="header-token-badge" id="header-token-badge">
            <span id="header-usage-text">10k tokens left</span>
          </div>
        </div>
      </header>
      <main class="page-content" id="page-content"></main>
    </div>

  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
